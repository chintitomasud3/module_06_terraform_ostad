name: SSH Connect_OSTAD

on:
  push:
    branches:
      - Development

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Beforessh
        run: |
          ip addr
  

      - name: Connect via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22

          script: |
            git clone https://github.com/chintitomasud3/module_06_terraform_ostad
            cd module_06_terraform_ostad/Backend
            npm install 
            node server.js
            pwd
            
